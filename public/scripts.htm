<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Scripts List</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #161b22; padding: 20px; border-radius: 6px; border: 1px solid #30363d; }
        .script-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #30363d; }
        .script-item a { color: #58a6ff; text-decoration: none; font-weight: bold; font-family: monospace; }
        .del-btn { background: #da3637; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Your Hosted Scripts</h2>
        <div id="list">Loading...</div>
    </div>

    <script>
        const token = localStorage.getItem('admin_token');
        if (!token) {
            document.body.innerHTML = "<h2>Unauthorized access. Please login first.</h2>";
        } else {
            loadScripts();
        }

        async function loadScripts() {
            const res = await fetch('/api/scripts/list', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = '';

            if (data.scripts.length === 0) {
                listDiv.innerHTML = '<p>No scripts found.</p>';
                return;
            }

            data.scripts.forEach(script => {
                listDiv.innerHTML += `
                    <div class="script-item">
                        <a href="/scripts/${script.filename}" target="_blank">/scripts/${script.filename}</a>
                        <button class="del-btn" onclick="deleteScript('${script._id}')">Delete</button>
                    </div>
                `;
            });
        }

        async function deleteScript(id) {
            if (!confirm("Are you sure you want to delete this script?")) return;
            await fetch(`/api/scripts/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            loadScripts();
        }
    </script>
</body>
</html>
